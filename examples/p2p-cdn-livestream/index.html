<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P CDN Livestream — Garfo</title>
<style>
  body { margin: 0; background: #0d1117; color: #f0f0f0; font: 14px/1.5 monospace; }
  #root { min-height: 100vh; }
  #preboot-error { display: none; }
</style>
<script>
window.addEventListener('error', function(e) {
  var el = document.getElementById('preboot-error');
  if (!el) { el = document.createElement('pre'); el.id = 'preboot-error'; el.style.cssText = 'display:block;padding:40px;color:#f44;background:#0d1117;min-height:100vh;white-space:pre-wrap;font:14px/1.5 monospace;'; document.body.prepend(el); }
  el.textContent += '[ERRO] ' + (e.error ? e.error.stack || e.error.message || e.error : e.message || e) + '\n\n';
  return false;
});
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('preboot-error');
  if (!el) { el = document.createElement('pre'); el.id = 'preboot-error'; el.style.cssText = 'display:block;padding:40px;color:#f44;background:#0d1117;min-height:100vh;white-space:pre-wrap;font:14px/1.5 monospace;'; document.body.prepend(el); }
  el.textContent += '[PROMISE] ' + (e.reason ? e.reason.stack || e.reason.message || e.reason : e) + '\n\n';
});
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
